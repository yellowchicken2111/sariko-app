server {
    listen 80;
    server_name api.local.bridgeai.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.sariko.store;

    ssl_certificate /etc/letsencrypt/live/api.sariko.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sariko.store/privkey.pem;

    # VNPay IPN: IP whitelist + dedicated access log (retain >= 60 days via logrotate).
    # Sandbox IPs commented out; uncomment when running SIT.
    location = /rest/v1/payments/vnpay/ipn {
        # allow 113.160.92.202;   # sandbox
        # allow 203.205.17.226;   # sandbox
        # allow 103.220.84.4;     # sandbox
        allow 113.52.45.78;       # production
        allow 116.97.245.130;     # production
        allow 42.118.107.252;     # production
        allow 113.20.97.250;      # production
        allow 203.171.19.146;     # production
        allow 103.220.87.4;       # production
        allow 103.220.86.4;       # production
        allow 103.220.86.10;      # production
        allow 103.220.87.10;      # production
        allow 103.220.86.139;     # production
        allow 103.220.87.139;     # production
        deny all;

        access_log /var/log/nginx/vnpay-ipn.access.log;

        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}