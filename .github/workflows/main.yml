on:
  push:
    branches:
      - feature/cicd
jobs:
  test:
    name: job name
    runs-on:
      labels: ec2-sariko-app
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          source /home/ubuntu/venv-app-sariko/bin/activate
          pip install -r backend/requirements.txt

      - name: Run pytest
        run: |
          source /home/ubuntu/venv-app-sariko/bin/activate
          pytest tests/backend -v
